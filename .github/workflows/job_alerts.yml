name: JobAlerts

on:
  schedule:
    # Every 2 hours, 07:00–17:00 CEST (= 05:00–15:00 UTC in summer)
    - cron: '0 5,7,9,11,13,15 * * *'
    # Weekly digest — every Sunday at 08:00 CEST (= 06:00 UTC)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Manual trigger — available from GitHub website or GitHub mobile app (24/7)

# Prevent concurrent runs from clobbering each other's seen_jobs.json push.
# If a run is already in progress, the new one waits (cancel-in-progress: false).
concurrency:
  group: job-alerts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so git show origin/master:seen_jobs.json works
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run JobAlerts
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          # Sunday 06:00 UTC = weekly digest
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)   # 7 = Sunday
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run triggered"
            python run.py --manual
          elif [ "$DAY" = "7" ] && [ "$HOUR" = "06" ]; then
            echo "Weekly digest run"
            python run.py --weekly
          else
            echo "Scheduled run"
            python run.py
          fi

      - name: Save seen jobs to repository
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Merge local seen_jobs.json with any entries pushed by a concurrent run
          # (edge case: workflow_dispatch while a scheduled run is finishing)
          git fetch origin master
          python merge_seen.py

          git add seen_jobs.json
          git diff --cached --quiet && echo "No changes to seen_jobs.json" && exit 0

          git commit -m "chore: update seen jobs [skip ci]"

          # Rebase our commit on top of any remote changes; -X ours resolves
          # seen_jobs.json conflicts in our favour (we merged from origin above).
          git pull --rebase -X ours origin master
          git push
